name: invoker-setup
version: 0.1.0
description: >
  Check and remediate the runtime environment for an AI skill using the invoker
  control plane. Runs `invoker doctor --json`, parses the structured report, and
  guides the AI through fixing missing CLI tools, tokens, env vars, resources,
  and dependent skills.

entrypoint: ./invoker-setup.md

requires:
  cli:
    - name: invoker
      command: invoker
      versionCommand: invoker --version
      installHint: "Run: npm install -g @anthropic/invoker  or  npx invoker"
      installCommand: "npm install -g @anthropic/invoker"

intents:
  - name: setup
    description: >
      Check a skill's environment and remediate any blocking issues.
    parameters:
      skill: path or name of the skill to check

  - name: check
    description: >
      Read-only doctor check: return the invoker doctor JSON report for a skill.
    parameters:
      skill: path or name of the skill to check
